<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Journal ~ Via</title>
    <meta name="description" content="Why Via exists." />
    <link rel="stylesheet" href="assets/css/site.css" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
  </head>
  <body>
    <nav>
      <span class="nav-mark">via</span>
      <ul class="nav-links" id="nav">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./getting-started.html">Docs</a></li>
        <li><a href="./book-of-faith.html" class="active">Journal</a></li>
        <li><a href="./features.html">Support</a></li>
      </ul>
      <button class="mobile-menu-toggle" aria-label="Menu" aria-expanded="false">Menu</button>
    </nav>

    <div class="hero hero-short">
      <div class="hero-content">
        <h1>Journal</h1>
        <p>Why Via exists.</p>
      </div>
    </div>

    <div class="page">
      <section>
        <h2>Why Via</h2>
        <p id="notes-status">Loading notes...</p>
      </section>

      <div id="notes-container"></div>

      <section id="admin-controls" style="display:none;">
        <h2>Admin</h2>
        <p style="margin-bottom:0.6rem;">Edit one note per line.</p>
        <textarea id="notes-editor" rows="10" style="width:100%; resize:vertical;"></textarea>
        <div style="margin-top:0.6rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
          <button id="save-notes" class="btn" type="button">Save</button>
          <button id="logout-notes" class="btn" type="button">Logout</button>
        </div>
      </section>

      <section id="admin-login" style="display:none;">
        <h2>Admin</h2>
        <p>Sign in to edit notes.</p>
        <p><a id="login-link" href="#">Login with GitHub</a></p>
      </section>

      <p class="feedback">Found something unexpected? <a href="https://github.com/palmshed/via/issues">Report an issue</a>.</p>
    </div>

    <footer>
      <p>&copy; 2026 Palmshed</p>
      <ul class="footer-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./getting-started.html">Docs</a></li>
        <li><a href="./book-of-faith.html">Journal</a></li>
        <li><a href="./features.html">Support</a></li>
      </ul>
    </footer>

    <script>
      const fallbackNotes = [
        'I open Via and I remember why I started.',
        'I wanted less noise. Less chrome. Less ceremony. Just a clear place to think, read, and build.',
        'So I kept cutting.',
        'I removed what looked impressive but felt heavy. I kept what I reached for every day.',
        'Tabs. History. Bookmarks. A clean bar. A fast way back to focus.',
        'Then I added AI, but carefully.',
        'Not as a loud assistant. Not as a gimmick. More like a quiet second mind when I need a summary, a quick explanation, or a fresh angle on a page I’m reading.',
        'When I move through pages, it should disappear. When I open settings, it should be obvious. When I switch tabs, it should feel immediate. When I close the app, my mind should stay clear.',
        'I think of Via as a tool for attention. Not just a tool for internet.',
        'One less distracting detail.',
        'I’m not trying to make the loudest browser. I’m trying to make one I trust every morning. A Via that gets out of the way, and lets me do real work.'
      ];

      const API_BASE = window.NOTES_API_BASE || '';
      const DEFAULT_NOTES_API_BASE = 'https://via-six.vercel.app';
      const RESOLVED_API_BASE = API_BASE || DEFAULT_NOTES_API_BASE;

      function escapeHtml(input) {
        return String(input)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function renderNotes(notes) {
        const container = document.getElementById('notes-container');
        container.innerHTML = '';
        for (const note of notes) {
          const card = document.createElement('div');
          card.className = 'note-card';
          card.innerHTML = '<p>' + escapeHtml(note) + '</p>';
          container.appendChild(card);
        }
      }

      function getTokenFromHash() {
        const hash = window.location.hash.startsWith('#') ? window.location.hash.substring(1) : '';
        const params = new URLSearchParams(hash);
        const token = params.get('admin_token');
        if (token) {
          localStorage.setItem('bf_admin_token', token);
          params.delete('admin_token');
          params.delete('admin_user');
          const nextHash = params.toString();
          const nextUrl = window.location.pathname + window.location.search + (nextHash ? '#' + nextHash : '');
          history.replaceState({}, '', nextUrl);
        }
        return localStorage.getItem('bf_admin_token') || '';
      }

      function clearToken() {
        localStorage.removeItem('bf_admin_token');
      }

      function authHeaders(token) {
        return token ? { Authorization: 'Bearer ' + token } : {};
      }

      function updateLoginLink() {
        const loginLink = document.getElementById('login-link');
        const returnTo = window.location.origin + window.location.pathname;
        loginLink.href = RESOLVED_API_BASE + '/api/auth/github/start?return_to=' + encodeURIComponent(returnTo);
      }

      async function loadNotes() {
        const status = document.getElementById('notes-status');
        const adminControls = document.getElementById('admin-controls');
        const adminLogin = document.getElementById('admin-login');
        const editor = document.getElementById('notes-editor');
        const token = getTokenFromHash();
        try {
          const res = await fetch(RESOLVED_API_BASE + '/api/notes', {
            headers: authHeaders(token),
          });
          const data = await res.json();
          const notes = Array.isArray(data.notes) ? data.notes : [];
          renderNotes(notes);
          status.textContent = notes.length ? 'Live notes' : 'No notes yet.';
          if (data.isAdmin) {
            adminControls.style.display = 'block';
            adminLogin.style.display = 'none';
            editor.value = notes.join('\n');
          } else {
            adminControls.style.display = 'none';
            adminLogin.style.display = 'block';
          }
        } catch (e) {
          renderNotes(fallbackNotes);
          status.textContent = 'Offline notes';
        }
      }

      async function saveNotes() {
        const status = document.getElementById('notes-status');
        const editor = document.getElementById('notes-editor');
        const token = getTokenFromHash();
        const notes = editor.value
          .split('\n')
          .map(function(line) { return line.trim(); })
          .filter(Boolean);
        try {
          const res = await fetch(RESOLVED_API_BASE + '/api/notes', {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders(token)),
            body: JSON.stringify({ notes: notes }),
          });
          if (!res.ok) {
            const err = await res.json().catch(function() { return {}; });
            throw new Error(err.error || 'Save failed');
          }
          status.textContent = 'Saved.';
          await loadNotes();
        } catch (e) {
          status.textContent = e.message || 'Save failed.';
        }
      }

      function logoutNotes() {
        clearToken();
        loadNotes();
      }

      document.getElementById('save-notes').addEventListener('click', saveNotes);
      document.getElementById('logout-notes').addEventListener('click', logoutNotes);

      updateLoginLink();
      loadNotes();
    </script>

    <script>
      (function() {
        var toggle = document.querySelector('.mobile-menu-toggle');
        var nav = document.getElementById('nav');
        if (!toggle || !nav) return;
        function sync() { toggle.setAttribute('aria-expanded', nav.classList.contains('active')); }
        toggle.addEventListener('click', function(e) {
          e.stopPropagation();
          nav.classList.toggle('active');
          sync();
        });
        document.addEventListener('click', function(e) {
          if (nav.classList.contains('active') && !nav.contains(e.target) && e.target !== toggle) {
            nav.classList.remove('active');
            sync();
          }
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && nav.classList.contains('active')) {
            nav.classList.remove('active');
            sync();
            toggle.focus();
          }
        });
      })();
    </script>
  </body>
</html>
