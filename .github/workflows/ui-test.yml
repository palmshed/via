name: UI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ui-test:
    name: UI
    runs-on: macos-latest
    if: github.repository_owner == 'bniladridas'

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: '3.44.0'
      - run: flutter pub get
      - name: Write env file
        run: |
          {
            echo "FIREBASE_API_KEY=AIzaSy000000000000000000000000000000000"
            echo "FIREBASE_APP_ID=1:1234567890:ios:0123456789abcdef012345"
            echo "FIREBASE_MESSAGING_SENDER_ID=1234567890"
            echo "FIREBASE_PROJECT_ID=dummy_project_id"
            echo "FIREBASE_STORAGE_BUCKET=dummy_storage_bucket"
          } > .env
      - name: Write macOS Firebase plist
        run: |
          cat << 'EOF' | sed 's/^          //' > macos/Runner/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key>
            <string>dummy_client_id</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>dummy_reversed_client_id</string>
            <key>API_KEY</key>
            <string>AIzaSy000000000000000000000000000000000</string>
            <key>GCM_SENDER_ID</key>
            <string>1234567890</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>com.bniladridas.browser</string>
            <key>PROJECT_ID</key>
            <string>dummy_project_id</string>
            <key>STORAGE_BUCKET</key>
            <string>dummy_storage_bucket</string>
          </dict>
          </plist>
          EOF
      - name: Widget tests
        run: flutter test test/widget_test.dart
      - name: Freezed files
        run: flutter pub run build_runner build
      - name: CocoaPods
        run: |
          cd ios
          pod install
      - name: iOS debug build
        run: flutter build ios --debug --no-codesign
      - name: iOS build prep
        run: |
          flutter clean
          flutter pub get
          flutter pub run build_runner build

      - name: iOS simulator build
        run: flutter build ios --debug --simulator --no-codesign
      - name: iOS simulator
        run: |
          xcrun simctl shutdown all || true
          SIMULATOR_UDID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/ {print $2; exit}')"
          if [ -z "$SIMULATOR_UDID" ]; then
            SIMULATOR_UDID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          fi
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
      - name: iOS test build
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner \
            -destination "id=$SIMULATOR_UDID" \
            -configuration Debug build-for-testing \
            CODE_SIGNING_ALLOWED=NO
      - name: iOS tests
        run: |
          cd ios
          xcodebuild test-without-building -workspace Runner.xcworkspace -scheme Runner \
            -destination "id=$SIMULATOR_UDID" \
            CODE_SIGNING_ALLOWED=NO || \
          xcodebuild test-without-building -workspace Runner.xcworkspace -scheme Runner \
            -destination "id=$SIMULATOR_UDID" \
            CODE_SIGNING_ALLOWED=NO
      - name: macOS debug build
        run: |
          flutter build macos --debug
          cd macos
          pod install
          cd ..
      - name: macOS tests
        run: |
          echo "macOS tests temporarily disabled"
