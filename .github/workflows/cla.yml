name: CLA

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  cla:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Palmshed'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            signed.json

      - id: app-token
        name: Create Via app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VIA_APP_ID }}
          private-key: ${{ secrets.VIA_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: write
          permission-contents: read

      - name: Checkout private cla-bot
        uses: actions/checkout@v6
        with:
          repository: palmshed/clabot
          token: ${{ steps.app-token.outputs.token }}
          path: cla-bot

      - name: Copy signed.json to cla-signers.json
        run: |
          cp signed.json cla-signers.json
          cp signed.json cla-bot/cla-signers.json

      - name: Run CLA bot
        uses: ./cla-bot/
        with:
          github-token: ${{ steps.app-token.outputs.token }}
