name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  bump-version:
    if: github.repository_owner == 'bniladridas' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - id: app-token
        name: Create Browser app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BROWSER_APP_ID }}
          private-key: ${{ secrets.BROWSER_APP_PRIVATE_KEY }}
          permission-actions: write
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: libnudget/bump@main
        with:
          pr-number: ${{ github.event.pull_request.number }}
          token: ${{ steps.app-token.outputs.token }}
