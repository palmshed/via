name: Project

on:
  issues:
    types: [opened, reopened, edited, labeled, unlabeled]
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

jobs:
  add-to-project:
    name: Project
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Palmshed'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Sync item
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/Palmshed/projects/10
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
