name: Release

on:
  push:
    tags:
      - 'desktop/app-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., desktop/app-1.2.2)'
        required: true

permissions:
  contents: read

jobs:
  build-and-release:
    name: Release
    runs-on: macos-latest
    if: github.repository_owner == 'Palmshed'
    env:
      MACOS_CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}

    steps:
      - id: app-token
        name: Create Via app token
        uses: actions/create-github-app-token@v2
        with:
          client-id: ${{ secrets.VIA_APP_CLIENT_ID }}
          private-key: ${{ secrets.VIA_APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: '3.44.4'

      - run: flutter pub get
      - name: Create .env file
        run: |
          {
            echo "FIREBASE_API_KEY=AIzaSy000000000000000000000000000000000"
            echo "FIREBASE_APP_ID=1:1234567890:ios:0123456789abcdef012345"
            echo "FIREBASE_MESSAGING_SENDER_ID=1234567890"
            echo "FIREBASE_PROJECT_ID=dummy_project_id"
            echo "FIREBASE_STORAGE_BUCKET=dummy_bucket"
          } > .env

      - name: Create dummy GoogleService-Info.plist
        run: |
          mkdir -p macos/Runner
          cat << 'EOF' | sed 's/^          //' > macos/Runner/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key><string>dummy</string>
            <key>REVERSED_CLIENT_ID</key><string>com.google.ReverseClientId</string>
            <key>API_KEY</key><string>AIzaSy000000000000000000000000000000000</string>
            <key>GCM_SENDER_ID</key><string>123456789</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>com.bniladridas.browser</string>
            <key>PROJECT_ID</key><string>dummy-project</string>
            <key>STORAGE_BUCKET</key><string>dummy-project.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><true/>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_SIGNIN_ENABLED</key><true/>
            <key>GOOGLE_APP_ID</key><string>1:1234567890:ios:0123456789abcdef012345</string>
          </dict>
          </plist>
          EOF

      - name: Build generated files
        run: flutter pub run build_runner build

      - name: Build macOS app
        env:
          APP_BUNDLE_ID: ${{ secrets.MACOS_APP_BUNDLE_ID }}
        run: flutter build macos --release 2>&1 | grep -v -E "(firebase_core|firebase_auth|firebase_app_check).*warning"

      - name: Check if certificate is available
        id: check-cert
        run: |
          if [ -n "${{ secrets.MACOS_CERTIFICATE }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.check-cert.outputs.available == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "${MACOS_CERTIFICATE}" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${MACOS_KEYCHAIN_PASSWORD}" build.keychain

      - name: Sign, notarize, and create DMG
        id: dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MACOS_CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
          DMG_BACKGROUND_COLOR: '#6b6d70'
          DMG_LABEL_INDEX: '4'
          DMG_HEADROOM_MB: '50'
        run: |
          chmod +x ./scripts/macos_release_dmg.sh
          if [ "${{ steps.check-cert.outputs.available }}" == "true" ] && ./scripts/macos_release_dmg.sh; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "Trying unsigned build..."
            ALLOW_UNSIGNED=1 ./scripts/macos_release_dmg.sh
            echo "status=unsigned" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        id: validate-tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if ! [[ "$TAG" =~ ^desktop/app-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag format invalid. Expected: desktop/app-X.Y.Z"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate tag exists
        run: |
          TAG="${{ steps.validate-tag.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag '$TAG' does not exist in repository"
            exit 1
          fi

      - name: Upload release asset
        id: upload
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/browser.dmg
          generate_release_notes: false
          tag_name: ${{ steps.validate-tag.outputs.tag }}
          token: ${{ steps.app-token.outputs.token }}
        continue-on-error: true

      - name: Verify upload
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        run: |
          if [[ ! -f build/macos/Build/Products/Release/browser.dmg ]]; then
            echo "Error: DMG file not found after upload attempt"
            exit 1
          fi

      - name: Unsigned build reminder
        if: ${{ steps.dmg.outputs.status == 'unsigned' }}
        run: |
          if [[ -f build/macos/Build/Products/Release/browser.dmg ]]; then
            echo "Warning: DMG is unsigned. Users will see Gatekeeper warnings on first launch."
          fi
