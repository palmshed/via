---

name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: macos-26
    if: github.repository_owner == 'Palmshed'

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: '3.44.6'
      - run: flutter pub get
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Create .env file
        run: |
          {
            echo "FIREBASE_API_KEY=AIzaSy000000000000000000000000000000000"
            echo "FIREBASE_APP_ID=1:1234567890:ios:0123456789abcdef012345"
            echo "FIREBASE_MESSAGING_SENDER_ID=1234567890"
            echo "FIREBASE_PROJECT_ID=dummy_project_id"
            echo "FIREBASE_STORAGE_BUCKET=dummy_storage_bucket"
          } > .env
      - name: Create GoogleService-Info.plist
        run: |
          cat << 'EOF' | sed 's/^          //' > macos/Runner/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>API_KEY</key>
              <string>AIzaSy000000000000000000000000000000000</string>
              <key>BUNDLE_ID</key>
              <string>com.bniladridas.browser</string>
              <key>GCM_SENDER_ID</key>
              <string>1234567890</string>
              <key>GOOGLE_APP_ID</key>
              <string>1:1234567890:ios:0123456789abcdef012345</string>
              <key>PROJECT_ID</key>
              <string>dummy-project-id</string>
              <key>STORAGE_BUCKET</key>
              <string>dummy-project-id.appspot.com</string>
              <key>CLIENT_ID</key>
              <string>dummy_client_id</string>
              <key>REVERSED_CLIENT_ID</key>
              <string>dummy_reversed_client_id</string>
          </dict>
          </plist>
          EOF
      - name: Clean pods cache
        run: |
          rm -rf macos/Pods
          rm -rf macos/Podfile.lock
          rm -rf build/macos
      - name: Build macOS app
        run: flutter build macos
      - name: Run yamllint
        run: |
          python3 -m venv .venv-yamllint
          source .venv-yamllint/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install yamllint
          yamllint .github/workflows
      - name: Run E2E integration tests
        run: |
          chmod +x scripts/e2e.sh
          ./scripts/e2e.sh
      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: build/e2e-artifacts/**
          if-no-files-found: warn
