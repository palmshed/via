# SPDX-License-Identifier: MIT
---
name: Create Codex PR

on:
  workflow_dispatch:
    inputs:
      head:
        description: "Source branch (head) for the PR"
        required: true
        type: string
      base:
        description: "Target branch (base) for the PR"
        required: true
        default: "main"
        type: string
      title:
        description: "PR title"
        required: true
        type: string
      body:
        description: "PR body (markdown)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Palmshed'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: app-token
        name: Create Via app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VIA_APP_ID }}
          private-key: ${{ secrets.VIA_APP_PRIVATE_KEY }}
          permission-pull-requests: write
          permission-contents: read

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          head="${{ inputs.head }}"
          base="${{ inputs.base }}"
          title="${{ inputs.title }}"
          body="${{ inputs.body }}"

          if gh pr view --head "$head" --json url >/dev/null 2>&1; then
            gh pr view --head "$head" --json url
            exit 0
          fi

          gh pr create \
            --head "$head" \
            --base "$base" \
            --title "$title" \
            --body "$body"
