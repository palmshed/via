name: Suggest Similar Issues

on:
  issues:
    types: [opened, reopened, edited]

jobs:
  suggest-similar:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'bniladridas'
    permissions:
      contents: read
    steps:
      - id: app-token
        name: Create Browser app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BROWSER_APP_ID }}
          private-key: ${{ secrets.BROWSER_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-contents: read

      - uses: libnudget/echo@main
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.repository }}
          issue_number: ${{ github.event.issue.number }}
          issue_title: ${{ github.event.issue.title }}
          issue_body: ${{ github.event.issue.body }}
          stopwords_regex: >-
            ^(this|that|with|from|have|will|when|where|would|should|into|than|then|they|them|their|there|here|what|which|while|after|before|about|browser|page|file|files|html|image|images|does|doesn|dont|cant|need|like|just|more|same|than|also)$
