name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  pr-title-check:
    name: PR title
    runs-on: ubuntu-latest
    if: github.repository_owner == 'bniladridas'
    steps:
      - name: Check title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          title_pattern='^(feat|fix|docs|refactor|chore|deps|perf|ci|build|revert)'
          title_pattern+='\[[a-zA-Z0-9]+([/_-][a-zA-Z0-9]+)*\]\ ::\ .+'
          if [[ ! "$TITLE" =~ $title_pattern ]]; then
            echo "PR title does not match format: type[scope] :: description"
            exit 1
          fi
          if printf "%s\n" "$TITLE" | grep -qiw "add"; then
            echo "ERROR: PR title contains 'add'. Use alternative verbs like integrate, implement, include, etc."
            exit 1
          fi
          echo "PR title format valid"
