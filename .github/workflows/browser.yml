    name: Via

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  check:
name: Via
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Palmshed'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - id: app-token
        name: Create Via app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VIA_APP_ID }}
          private-key: ${{ secrets.VIA_APP_PRIVATE_KEY }}
          permission-checks: write
          permission-pull-requests: read
          permission-contents: read

      - name: Publish check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh api "repos/$REPO/check-runs" \
            -X POST \
            -f name='Via' \
            -f head_sha="$HEAD_SHA" \
            -f status='completed' \
            -f conclusion='success' \
            -f 'output[title]=Via automation' \
            -f 'output[summary]=Via app automation is active for this ref.' \
            --silent
