version: 2.1

executors:
  flutter:
    docker:
      - image: ghcr.io/cirruslabs/flutter:3.41.9
    working_directory: ~/project

commands:
  restore_flutter_cache:
    steps:
      - restore_cache:
          keys:
            - flutter-pub-v1-{{ checksum "pubspec.lock" }}
            - flutter-pub-v1-

  save_flutter_cache:
    steps:
      - save_cache:
          key: flutter-pub-v1-{{ checksum "pubspec.lock" }}
          paths:
            - ~/.pub-cache

jobs:
  maintenance:
    executor: flutter
    steps:
      - checkout

      - run:
          name: Flutter version
          command: flutter --version

      - restore_flutter_cache

      - run:
          name: Dependencies
          command: flutter pub get

      - run:
          name: Write env file
          command: |
            echo "FIREBASE_API_KEY=test" > .env
            echo "FIREBASE_PROJECT_ID=test" >> .env
            echo "FIREBASE_APP_ID=test" >> .env
            echo "FIREBASE_MESSAGING_SENDER_ID=test" >> .env

      - save_flutter_cache

      - run:
          name: Generate code
          command: flutter pub run build_runner build --delete-conflicting-outputs

      - run:
          name: Analyze
          command: flutter analyze --fatal-infos

      - run:
          name: Tests
          command: flutter test --no-pub --coverage

workflows:
  # Runs on every push
  push:
    jobs:
      - maintenance

  # Runs daily on schedule
  daily:
    triggers:
      - schedule:
          cron: "0 6 * * *"
          filters:
            branches:
              only:
                - main
                - master
    jobs:
      - maintenance
